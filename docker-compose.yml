services:
  spatial_db:
    image: postgis/postgis:15-3.3
    container_name: silverbell_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin_password
      POSTGRES_DB: silverbell
    ports:
      - "5432:5432"
    volumes:
      - silverbell_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  silverbell_db_data: